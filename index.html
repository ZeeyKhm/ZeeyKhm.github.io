<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ミナザキ</title>
  <link rel="icon" type="image/png" href="asset/images/logo.png">
  <link rel="apple-touch-icon" href="asset/images/logo.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0b111a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Minazaki">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <meta name="description" content="My personal link tree, a way to share your social links!">
  <link rel="canonical" href="https://codepen.io/hassified/pen/zYapqyP" />
</head>

<body>
  <!-- <video class="bg-video" autoplay muted loop playsinline>
    <source src="asset/videos/bg.mp4" type="video/mp4">
  </video> -->

  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-spinner"></div>
    <p>Loading...</p>
  </div>

  <div class="container">
    <img id="profile-image" class="profile" src="" alt="Profile Image">
    <h1 id="user-name" class="user-name"></h1>
    <p id="description" class="description"></p>
    <div id="links-container" class="links"></div>
    <a id="reach-out-btn" class="reach-out-btn" target="_blank" rel="noopener noreferrer"></a>
    <div id="social-links" class="social"></div>
    <p class="footer-text">© 2026 <a href='https://zeeykhm.github.io/' target="_blank">Minazaki</a></p>
  </div>

  <button id="dashboard-trigger" class="dashboard-trigger" type="button" aria-label="Open dashboard access">
    &#9432;
  </button>

  <div id="auth-modal" class="auth-modal" aria-hidden="true">
    <div class="auth-modal-card" role="dialog" aria-modal="true" aria-labelledby="auth-modal-title">
      <button id="auth-close" class="auth-close" type="button" aria-label="Close dialog">&times;</button>

      <section id="auth-login-view" class="auth-view">
        <h2 id="auth-modal-title">Login First</h2>
        <p>Log in before opening your dashboard.</p>
        <form id="login-form" class="auth-form" novalidate>
          <label for="login-email">Email</label>
          <input id="login-email" name="email" type="email" required>
          <label for="login-password">Password</label>
          <input id="login-password" name="password" type="password" required>
          <button type="submit">Login</button>
        </form>
        <div class="auth-links">
          <button type="button" data-auth-view="register">Register</button>
          <button type="button" data-auth-view="forgot">Forgot Password</button>
        </div>
      </section>

      <section id="auth-register-view" class="auth-view" hidden>
        <h2>Create Account</h2>
        <p>Register an account to unlock dashboard access.</p>
        <form id="register-form" class="auth-form" novalidate>
          <label for="register-name">Name</label>
          <input id="register-name" name="name" type="text" required>
          <label for="register-email">Email</label>
          <input id="register-email" name="email" type="email" required>
          <label for="register-password">Password</label>
          <input id="register-password" name="password" type="password" minlength="6" required>
          <button type="submit">Register</button>
        </form>
        <div class="auth-links">
          <button type="button" data-auth-view="login">Back to Login</button>
        </div>
      </section>

      <section id="auth-forgot-view" class="auth-view" hidden>
        <h2>Reset Password</h2>
        <p>Enter your email to receive a password reset link.</p>
        <form id="forgot-form" class="auth-form" novalidate>
          <label for="forgot-email">Email</label>
          <input id="forgot-email" name="email" type="email" required>
          <button type="submit">Send Reset Email</button>
        </form>
        <div class="auth-links">
          <button type="button" data-auth-view="login">Back to Login</button>
        </div>
      </section>

      <section id="auth-dashboard-view" class="auth-view" hidden>
        <h2>Your Dashboard</h2>
        <p id="dashboard-welcome"></p>
        <div class="auth-actions">
          <a id="dashboard-link" href="#">Open Dashboard</a>
          <button id="logout-btn" type="button">Logout</button>
        </div>
      </section>

      <p id="auth-message" class="auth-message" role="status" aria-live="polite"></p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="script.js"></script>
</body>

</html>
