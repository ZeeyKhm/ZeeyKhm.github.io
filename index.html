<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Landing Page</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

<div class="container">

  <!-- LEFT PANEL -->
  <div class="left">
    <div class="profile-img"></div>
    <div class="name">Your Name</div>
    <div class="tagline">Cybersecurity & AI | Threat Detection</div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">

    <!-- WEBSITE STACK -->
    <div class="link-stack">

      <div class="primary" onclick="window.open('https://your-personal-site.com', '_blank')">
        <h2>🌐 Personal Website</h2>
        <p>Research profile & overview</p>
      </div>

      <div class="secondary" onclick="window.open('https://your-portfolio.com', '_blank')">
        <h3>🚀 Portfolio Website</h3>
        <p>Projects & technical case studies</p>
      </div>

    </div>

    <!-- GRID LINKS -->
    <div class="grid">

      <div class="card">🐙 GitHub</div>
      <div class="card">📚 Publications</div>
      <div class="card">📄 Certificates</div>
      <div class="card">📑 CV</div>
      <div class="card">💼 LinkedIn</div>
      <div class="card">✉️ Email</div>

    </div>

    <!-- FOOTER -->
    <div class="footer">
      © 2026 Your Name
    </div>

  </div>

</div>

</body>
</html>
